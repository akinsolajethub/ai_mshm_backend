[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -q
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that require external services
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Skip broken test modules that reference removed URLs
# test_centers.py references 'admin-hcc-list' (removed)
# test_onboarding.py references 'rppg' (removed)
testpaths = apps.accounts.tests apps.notifications.tests apps.settings_app.tests
